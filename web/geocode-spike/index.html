<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>GovMap Geocoding Spike</title>
    <link rel="stylesheet" href="./styles.css">
    <script src="https://www.govmap.gov.il/govmap/api/govmap.api.js" defer></script>
    <script src="./app.js" defer></script>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>GovMap Geocoding Spike</h1>
        <p id="originText" class="muted">Checking page origin...</p>
      </div>
      <div id="sampleBadge" class="badge">Loading sample</div>
    </header>

    <main class="layout">
      <section class="panel controls">
        <div class="field token-field">
          <label for="apiToken">GovMap API token</label>
          <input id="apiToken" type="password" autocomplete="off" spellcheck="false" placeholder="Paste approved token here">
        </div>

        <div class="settings-grid">
          <div class="field">
            <label for="maxResults">Max results</label>
            <input id="maxResults" type="number" min="1" max="10" value="3">
          </div>
          <div class="field">
            <label for="delayMs">Delay between calls, ms</label>
            <input id="delayMs" type="number" min="0" max="5000" step="50" value="300">
          </div>
          <div class="field wide">
            <label for="layers">Optional layers</label>
            <input id="layers" type="text" spellcheck="false" placeholder="Comma-separated GovMap layers">
          </div>
          <label class="toggle">
            <input id="accurate" type="checkbox" checked>
            <span>Use accurate search</span>
          </label>
        </div>

        <div class="actions">
          <button id="runOne" type="button">Run first row</button>
          <button id="runAll" type="button">Run all sample rows</button>
          <button id="stopRun" type="button" class="secondary" disabled>Stop</button>
          <button id="downloadCsv" type="button" class="secondary" disabled>Download CSV</button>
          <button id="dryRunCsv" type="button" class="secondary">Download dry-run CSV</button>
        </div>
      </section>

      <section class="panel status-panel">
        <div>
          <h2>Run Status</h2>
          <p id="statusText" class="muted">Waiting for sample and GovMap script.</p>
        </div>
        <progress id="progressBar" value="0" max="1"></progress>
        <div id="summaryCounts" class="counts"></div>
      </section>

      <section class="panel sample-panel">
        <h2>Sample</h2>
        <div id="sampleStats" class="stats"></div>
      </section>

      <section class="panel results-panel">
        <div class="results-header">
          <h2>Results</h2>
          <p class="muted">Rows are marked <code>needs_review</code> by design.</p>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>Query</th>
                <th>Category</th>
                <th>Status</th>
                <th>Matched text</th>
                <th>Score</th>
                <th>ITM X</th>
                <th>ITM Y</th>
                <th>Notes</th>
              </tr>
            </thead>
            <tbody id="resultsBody">
              <tr>
                <td colspan="8" class="empty">No results yet.</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>
    </main>
  </body>
</html>
